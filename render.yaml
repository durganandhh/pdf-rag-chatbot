services:
  - type: web
    name: docchat-api
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

  - type: web
    name: docchat-ui
    runtime: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://docchat-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
